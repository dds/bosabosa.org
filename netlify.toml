[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
NODE_VERSION = "22"

[context.production.environment]
NEXT_SERVERLESS = "true"
NODE_ENV = "production"

[[redirects]]
  from = "/b"
  to = "/news"
  status = 301
  force = false
  query = {slug = ":slug"}

[functions]
  included_files = ["feed.js", "sitemap.js", "content/blog/*.md"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </rss.xml>; rel="alternate"; type="application/rss+xml", </.well-known/mcp/server-card.json>; rel="describedby"'''

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.well-known/mcp/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.well-known/agent-skills/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
